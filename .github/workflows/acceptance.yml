name: CI
on: [pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 21.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      #TODO: Migrate to GitHub CI App
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.TEMP_DEPLOY_KEY }}
            ${{ secrets.TEMP_SC_DEPLOY_KEY }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install Dependencies
        run: npm install
      - name: Run Build
        run: npm run build --if-present
      - name: Lint Codebase
        run: npm run lint --if-present
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Build Storybook
        run: npm run build-storybook --quiet
      - name: Serve Storybook and run tests
        run: |
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server storybook-static --port 6006" \
            "npx wait-on http://127.0.0.1:6006 && npm run coverage"
        # Setup deployment environment variables
      - name: Set environment variables
        run: |
          echo "ENVIRONMENT=testnet" >> $GITHUB_ENV
          echo "CF_PROJECT_NAME=${{ secrets.CF_PROJECT_NAME_TESTNET }}" >> $GITHUB_ENV
        # Build the Astro project with mode
      - name: Build the project
        run: npm run build -- --mode ${{ env.ENVIRONMENT }}

        # Deploy to Cloudflare Pages using wrangler
      - name: Publish to Cloudflare Pages (${{ env.ENVIRONMENT }})
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: |
            pages deploy dist --project-name ${{ env.CF_PROJECT_NAME }}
